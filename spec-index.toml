# Index of Freedesktop.org Specifications

[appstream]
gitweb = "https://github.com/ximion/appstream"
externally_managed = true
docs_url="https://www.freedesktop.org/software/appstream/docs/"

[autostart]
gitweb = "https://gitlab.freedesktop.org/xdg/xdg-specs"
local = true
single_page = true

[basedir]
gitweb = "https://gitlab.freedesktop.org/xdg/xdg-specs"
local = true
single_page = true

[clipboard]
gitweb = "https://gitlab.freedesktop.org/xdg/xdg-specs"
location = "clipboard/clipboard.xml"
local = true
single_page = true
labels = ['X11']

[clipboard-extensions]
gitweb = "https://gitlab.freedesktop.org/xdg/xdg-specs"
location = "clipboard/clipboard-extensions.xml"
local = true
single_page = true
labels = ['X11']

[dbus]
gitweb = "https://gitlab.freedesktop.org/dbus/dbus"
externally_managed = true
docs_url="https://dbus.freedesktop.org/doc/dbus-specification.html"

[desktop-entry]
gitweb = "https://gitlab.freedesktop.org/xdg/xdg-specs"
local = true
redirects = [
    ["ar01s02.html", "file-naming.html"],
    ["ar01s03.html", "basic-format.html"],
    ["ar01s04.html", "value-types.html"],
    ["ar01s05.html", "localized-keys.html"],
    ["ar01s06.html", "recognized-keys.html"],
    ["ar01s07.html", "exec-variables.html"],
    ["ar01s08.html", "dbus.html"],
    ["ar01s09.html", "interfaces.html"],
    ["ar01s10.html", "mime-types.html"],
    ["ar01s11.html", "extra-actions.html"],
    ["ar01s12.html", "extending.html"],
    ["apa.html", "example.html"],
    ["apb.html", "kde-items.html"],
    ["apc.html", "deprecated-items.html"],
    ["apd.html", "legacy-mixed.html"],
]

[global-shortcuts]
gitweb = "https://gitlab.freedesktop.org/xdg/xdg-specs"
local = true
single_page = true
